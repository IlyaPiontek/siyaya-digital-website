<style>
  :root{
    --p1:#ff9f1c;        /* amber — player 1, attacks TOP goal   */
    --p2:#3ec5ff;        /* sky   — player 2 / CPU, attacks BOTTOM goal */
    --ink:#0b140d;
    --chalk:#f3f6ef;
    --grass:#338a47;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#070d09;overflow:hidden;
    font-family:'Space Grotesk',system-ui,sans-serif;color:var(--chalk);
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #stage{
    position:relative;height:100dvh;width:calc(100dvh * 9 / 16);
    max-width:100vw;max-height:calc(100vw * 16 / 9);
    margin:0 auto;touch-action:none;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* ===================== SCOREBOARD ===================== */
  #board{
    position:absolute;top:0;left:0;right:0;z-index:5;
    display:flex;align-items:stretch;justify-content:space-between;
    background:linear-gradient(180deg,rgba(8,14,10,.92),rgba(8,14,10,.5) 78%,transparent);
    padding:8px 14px 20px;pointer-events:none;
  }
  .side{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:80px;
    padding:5px 10px;border-radius:10px;border:1.5px solid transparent;transition:.25s}
  .side .name{font-size:10px;letter-spacing:.13em;text-transform:uppercase;opacity:.75}
  .side .score{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
    font-size:40px;line-height:.9;letter-spacing:.04em}
  #s1 .score{color:var(--p1)} #s2 .score{color:var(--p2)}
  .side.active{border-color:currentColor;background:rgba(255,255,255,.05)}
  #s1.active{color:var(--p1)} #s2.active{color:var(--p2)}
  #mid{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  #mid .rule{font-size:9px;letter-spacing:.2em;text-transform:uppercase;opacity:.5}
  #turn{font-family:'Bebas Neue',Impact,sans-serif;font-size:19px;letter-spacing:.07em}

  /* ===================== FLASH ===================== */
  #flash{
    position:absolute;top:40%;left:0;right:0;z-index:6;text-align:center;
    font-family:'Bebas Neue',Impact,sans-serif;font-size:72px;letter-spacing:.06em;
    pointer-events:none;opacity:0;transform:scale(.7);text-shadow:0 4px 24px rgba(0,0,0,.6);
  }
  #flash.show{animation:pop .95s ease forwards}
  @keyframes pop{
    0%{opacity:0;transform:scale(.6) rotate(-3deg)}
    18%{opacity:1;transform:scale(1.08) rotate(1deg)}
    30%{transform:scale(1)} 75%{opacity:1} 100%{opacity:0;transform:scale(1.04)}
  }

  /* ===================== HINT ===================== */
  #hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;z-index:5;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.5;pointer-events:none;transition:opacity .4s}
  #hint.hide{opacity:0}

  /* ===================== HOME BUTTON (in-game) ===================== */
  #homeBtn{position:absolute;left:12px;bottom:34px;z-index:7;display:none;
    align-items:center;gap:6px;padding:8px 14px 8px 11px;border-radius:999px;cursor:pointer;
    background:rgba(8,14,10,.62);border:1.5px solid rgba(243,246,239,.28);color:var(--chalk);
    font-family:'Bebas Neue',Impact,sans-serif;font-size:15px;letter-spacing:.1em;
    backdrop-filter:blur(4px);transition:.16s;-webkit-backdrop-filter:blur(4px)}
  #homeBtn.show{display:inline-flex}
  #homeBtn:hover,#homeBtn:focus-visible{background:rgba(8,14,10,.85);border-color:var(--chalk);outline:none}
  #homeBtn:active{transform:scale(.96)}
  #homeBtn svg{width:15px;height:15px;display:block}

  /* ===================== MENU / LANDING ===================== */
  .overlay{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(120% 80% at 50% 18%, #0c5a2c 0%, #08381c 42%, #050d09 100%);}
  .overlay.show{display:flex}

  #menu{padding:26px 22px;gap:0;overflow-y:auto}
  .logo{width:118px;height:118px;border-radius:26px;margin:0 auto 6px;
    box-shadow:0 14px 40px rgba(0,0,0,.55), 0 0 60px rgba(46,200,90,.25);}
  .brand{font-family:'Bebas Neue',Impact,sans-serif;font-size:62px;line-height:.86;letter-spacing:.04em;
    margin-top:4px}
  .brand .x{color:var(--p1)}
  .tag{font-size:11px;letter-spacing:.32em;text-transform:uppercase;opacity:.6;margin-bottom:24px}

  .block{width:100%;max-width:340px;margin:0 auto}
  .label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.6;
    text-align:left;margin:0 4px 9px}

  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .mode{background:rgba(255,255,255,.05);border:1.6px solid rgba(255,255,255,.14);
    border-radius:14px;padding:15px 10px;cursor:pointer;transition:.18s;color:var(--chalk)}
  .mode .ic{font-size:26px;line-height:1}
  .mode .t{font-family:'Bebas Neue',Impact,sans-serif;font-size:21px;letter-spacing:.05em;margin-top:5px}
  .mode .d{font-size:10px;opacity:.6;letter-spacing:.04em;margin-top:1px}
  .mode.sel{border-color:var(--p1);background:rgba(255,159,28,.14);
    box-shadow:0 0 0 1px var(--p1) inset, 0 6px 20px rgba(255,159,28,.18)}

  .levels{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:12px}
  .lv{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.05);border:1.6px solid rgba(255,255,255,.14);border-radius:11px;
    font-family:'Bebas Neue',Impact,sans-serif;font-size:24px;cursor:pointer;transition:.16s;color:var(--chalk)}
  .lv.sel{border-color:var(--p2);background:rgba(62,197,255,.16);
    box-shadow:0 0 0 1px var(--p2) inset, 0 6px 18px rgba(62,197,255,.2);transform:translateY(-1px)}
  .lvdesc{min-height:32px;font-size:12.5px;letter-spacing:.03em;opacity:.78;margin-bottom:22px;line-height:1.35}
  .lvdesc b{color:var(--p2);font-weight:700}

  .play{font-family:'Bebas Neue',Impact,sans-serif;font-size:30px;letter-spacing:.1em;
    padding:15px 0;width:100%;max-width:340px;border:none;border-radius:14px;cursor:pointer;
    color:#06220f;background:linear-gradient(180deg,#5ee07f,#28b457);
    box-shadow:0 10px 26px rgba(40,180,87,.4);transition:.16s}
  .play:hover,.play:focus-visible{filter:brightness(1.06);transform:translateY(-1px);outline:none}
  .play:active{transform:translateY(1px)}

  .footer{position:absolute;bottom:14px;left:0;right:0;text-align:center;
    font-size:11px;letter-spacing:.08em;opacity:.55}
  .footer a{color:var(--chalk);text-decoration:none;border-bottom:1px solid rgba(243,246,239,.4);padding-bottom:1px}
  .footer a:hover{opacity:.85}

  /* ===================== WIN ===================== */
  #win{gap:8px}
  #win .trophy{font-size:52px}
  #win h1{font-family:'Bebas Neue',Impact,sans-serif;font-size:64px;letter-spacing:.05em;line-height:1}
  #win .final{font-size:15px;opacity:.7;letter-spacing:.1em;margin-bottom:8px}
  .wbtns{display:flex;gap:10px;margin-top:14px}
  .wbtn{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;letter-spacing:.1em;
    padding:11px 26px;border-radius:999px;cursor:pointer;transition:.18s;border:2px solid var(--chalk);
    background:transparent;color:var(--chalk)}
  .wbtn.primary{background:var(--chalk);color:var(--ink)}
  .wbtn:hover,.wbtn:focus-visible{filter:brightness(1.05);outline:none}
  .wbtn.primary:hover{background:#fff}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>

  <!-- scoreboard -->
  <div id="board">
    <div class="side active" id="s1"><span class="name" id="n1">Player 1</span><span class="score" id="sc1">0</span></div>
    <div id="mid"><span class="rule">First to 10</span><span id="turn" style="color:var(--p1)">P1 shoots ▲</span></div>
    <div class="side" id="s2"><span class="name" id="n2">Player 2</span><span class="score" id="sc2">0</span></div>
  </div>

  <div id="flash"></div>
  <div id="hint">Drag the ball back &amp; release · score in the glowing goal</div>

  <button id="homeBtn" aria-label="Back to menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
    Home
  </button>

  <!-- ===== LANDING / MENU ===== -->
  <div class="overlay show" id="menu">
    <img class="logo" id="logo" alt="SoccerX">
    <div class="brand">Soccer<span class="x">X</span></div>
    <div class="tag">Top-down penalty duel</div>

    <div class="block">
      <div class="label">Mode</div>
      <div class="modes">
        <div class="mode sel" id="mSolo" data-mode="solo">
          <div class="ic">🎯</div><div class="t">Solo</div><div class="d">You vs CPU</div>
        </div>
        <div class="mode" id="mDuo" data-mode="duo">
          <div class="ic">🆚</div><div class="t">2 Players</div><div class="d">Pass &amp; play</div>
        </div>
      </div>
    </div>

    <div class="block">
      <div class="label">Difficulty</div>
      <div class="levels" id="levels"></div>
      <div class="lvdesc" id="lvdesc"></div>
    </div>

    <button class="play" id="playBtn">Kick Off</button>
  </div>

  <!-- ===== WIN ===== -->
  <div class="overlay" id="win">
    <div class="trophy">🏆</div>
    <h1 id="winName">Player 1 wins</h1>
    <div class="final" id="winScore">10 — 0</div>
    <div class="wbtns">
      <button class="wbtn primary" id="again">Rematch</button>
      <button class="wbtn" id="toMenu">Main menu</button>

  // ---------- canvas / world ----------
  const W = 540, H = 960;

      o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime);
      if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide),ac.currentTime+dur);
      g.gain.setValueAtTime(vol,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
      o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);

  }

  // ---------- obstacles ----------
  function buildObstacles(){
    obstacles = [];
    const per = level - 1;                  // obstacles per side (incl. keeper)
    if (per <= 0) return;
    ['top','bottom'].forEach(side=>{
      const line = goals[side].y, dir = goals[side].dir;
      // keeper — slides within the posts, right at the mouth
      obstacles.push(makeBar({
        kind:'keeper', x:W/2, y:line + dir*10, halfW:30, halfH:6,
        min:W/2-G.halfW+34, max:W/2+G.halfW-34,
        speed:1.7+Math.random()*0.5, phase:Math.random()*6.28
      }));
      // defender rows — slide across the full pitch width within this side's half
      const rows = per - 1;
      if (rows>0){
        const bandA = line + dir*(BOX_D + 26);          // just outside the box
        const bandB = MID_Y - dir*34;                   // up to the halfway line
        for (let r=0;r<rows;r++){
          const f = rows===1 ? 0.5 : r/(rows-1);
          const y = bandA + (bandB-bandA)*f;
          obstacles.push(makeBar({
            kind:'player', side, x:W/2, y, halfW:30, halfH:6.5,
            min:F.l+34, max:F.r-34,
            speed:(1.3+Math.random()*1.1)*(Math.random()<.5?1:-1),
            phase:Math.random()*6.28
          }));
        }
      }
    });

  function makeBar(o){ o.t=o.phase||0; o.cx=(o.min+o.max)/2; o.amp=(o.max-o.min)/2; return o; }
  function moveObstacles(dt){
    for(const o of obstacles){

    }

    const cx=clamp(ball.x,o.x-o.halfW,o.x+o.halfW), cy=clamp(ball.y,o.y-o.halfH,o.y+o.halfH);
    let dx=ball.x-cx, dy=ball.y-cy, d2=dx*dx+dy*dy;
    if(d2>=R*R) return false;
    let d=Math.sqrt(d2), nx, ny;
    if(d>0.001){ nx=dx/d; ny=dy/d; }

      const px=o.halfW+R-Math.abs(ball.x-o.x), py=o.halfH+R-Math.abs(ball.y-o.y);
      if(px<py){ nx=Math.sign(ball.x-o.x)||1; ny=0; } else { nx=0; ny=Math.sign(ball.y-o.y)||1; }
    }
    ball.x=cx+nx*R; ball.y=cy+ny*R;
    const dot=ball.vx*nx+ball.vy*ny;
    if(dot<0){ ball.vx-=2*dot*nx; ball.vy-=2*dot*ny; ball.vx*=BAR_BOUNCE; ball.vy*=BAR_BOUNCE;
      o.kind==='keeper'?sSave():sBounce(Math.hypot(ball.vx,ball.vy)); }
    return true;

  // ---------- input ----------

    hint.classList.add('hide'); sKick(pow);
  }

  // ---------- CPU ----------
  function cpuShoot(){
    const targetSide = TARGET[1];                 // CPU attacks the bottom goal
    const line = goals[targetSide].y;
    const aimX = W/2 + (Math.random()*2-1) * (G.halfW-22);   // somewhere in the mouth
    const aimY = line + goals[targetSide].dir*4;
    let ax=aimX-ball.x, ay=aimY-ball.y; const d=Math.hypot(ax,ay)||1; ax/=d; ay/=d;
    // accuracy improves slightly with level; always beatable
    const aimErr=(Math.random()*2-1)*(0.22 - level*0.012);
    const ca=Math.cos(aimErr), sa=Math.sin(aimErr);
    const dirx=ax*ca-ay*sa, diry=ax*sa+ay*ca;
    const pow=clamp(d/620 + 0.45 + Math.random()*0.2, 0.45, 1);
    launch(dirx*MAX_V*pow, diry*MAX_V*pow, pow);
  }

  // ---------- physics ----------
  const inMouth=x=>x>W/2-G.halfW+G.postR+R*0.4 && x<W/2+G.halfW-G.postR-R*0.4;
  function bouncePost(p){
    const dx=ball.x-p.x, dy=ball.y-p.y, d=Math.hypot(dx,dy), min=R+G.postR;
    if(d>0&&d<min){ const nx=dx/d, ny=dy/d;
      ball.x=p.x+nx*min; ball.y=p.y+ny*min;
      const dot=ball.vx*nx+ball.vy*ny;
      if(dot<0){ ball.vx-=2*dot*nx; ball.vy-=2*dot*ny; ball.vx*=POST_BOUNCE; ball.vy*=POST_BOUNCE; sBounce(Math.hypot(ball.vx,ball.vy)); } }
  }
  function scoreGoal(side){
    goalSide=side; ripple[side]=1;
    const scorer=(side===TARGET[player])?player:1-player;   // wrong net = own goal
    scores[scorer]++; syncBoard();
    const nm = scorer===0?'P1':(mode==='solo'?'CPU':'P2');
    if(scorer===player){ showFlash('GOAL!',COLORS[player]); sGoal(); }
    else{ showFlash('OWN GOAL!',COLORS[scorer]); sOwn(); }
  }
  function step(){
    if(state!=='shot') return;
    ball.x+=ball.vx; ball.y+=ball.vy;
    const f=goalSide?NET_FRICTION:FRICTION; ball.vx*=f; ball.vy*=f;
    trail.push({x:ball.x,y:ball.y}); if(trail.length>22) trail.shift();

    if(ball.x<F.l+R){ ball.x=F.l+R; ball.vx=-ball.vx*WALL_BOUNCE; sBounce(Math.abs(ball.vx)); }
    if(ball.x>F.r-R){ ball.x=F.r-R; ball.vx=-ball.vx*WALL_BOUNCE; sBounce(Math.abs(ball.vx)); }

    if(!goalSide) for(const o of obstacles) hitBar(o);   // defenders block before the line
    posts.forEach(bouncePost);

    if(!goalSide){
      if(ball.y<F.t+R){
        if(inMouth(ball.x)&&ball.vy<0) scoreGoal('top');
        else if(!inMouth(ball.x)){ ball.y=F.t+R; ball.vy=-ball.vy*WALL_BOUNCE; sBounce(Math.abs(ball.vy)); }
      }
      if(ball.y>F.b-R){
        if(inMouth(ball.x)&&ball.vy>0) scoreGoal('bottom');
        else if(!inMouth(ball.x)){ ball.y=F.b-R; ball.vy=-ball.vy*WALL_BOUNCE; sBounce(Math.abs(ball.vy)); }
      }
    } else {
      const nl=W/2-G.halfW+R*0.5, nr=W/2+G.halfW-R*0.5;
      if(ball.x<nl){ ball.x=nl; ball.vx=-ball.vx*0.4; }
      if(ball.x>nr){ ball.x=nr; ball.vx=-ball.vx*0.4; }
      if(goalSide==='top'){ const back=F.t-G.depth+R*0.6; if(ball.y<back){ball.y=back;ball.vy=-ball.vy*0.4;ripple.top=1;} }
      else{ const back=F.b+G.depth-R*0.6; if(ball.y>back){ball.y=back;ball.vy=-ball.vy*0.4;ripple.bottom=1;} }
    }

    if(Math.hypot(ball.vx,ball.vy)<STOP_V){
      ball.vx=ball.vy=0; state='between';
      if(!goalSide){ showFlash('MISS','rgba(243,246,239,.85)'); sMiss(); }
      setTimeout(endTurn, goalSide?1100:850);
    }
  }
  function endTurn(){
    const leader = scores[0]>=10?0 : scores[1]>=10?1 : -1;
    if(leader>=0){
      state='over';
      const nm = leader===0 ? 'Player 1' : (mode==='solo'?'CPU':'Player 2');
      winName.textContent = (mode==='solo'&&leader===0) ? 'You win!' :
                            (mode==='solo'&&leader===1) ? 'CPU wins' : `${nm} wins`;
      winName.style.color=COLORS[leader];
      winScore.textContent=`${scores[0]} — ${scores[1]}`;
      winEl.classList.add('show'); syncBoard(); return;
    }
    const scored=!!goalSide;
    player=1-player;
    if(scored){ ball.x=CENTER.x; ball.y=CENTER.y; ball.vx=ball.vy=0; }  // kick-off after a goal
    trail=[]; goalSide=null; state='aim';
    if(isCPU(player)) cpuTimer = 50;     // ~0.8s think time
    syncBoard();
  }

  // ---------- flow ----------
  function startGame(){
    scores=[0,0]; player=0; goalSide=null; trail=[];
    ball.x=CENTER.x; ball.y=CENTER.y; ball.vx=ball.vy=0;
    buildObstacles();
    menuEl.classList.remove('show'); winEl.classList.remove('show');
    hint.classList.remove('hide'); state='aim'; syncBoard();
  }
  $('playBtn').addEventListener('click',()=>{ audio(); startGame(); });
  $('again').addEventListener('click',()=>{ audio(); startGame(); });
  function goHome(){
    state='menu'; drag=null; ball.vx=ball.vy=0;
    winEl.classList.remove('show'); menuEl.classList.add('show');
  }
  $('toMenu').addEventListener('click', goHome);
  $('homeBtn').addEventListener('click', goHome);
  function syncHomeBtn(){
    const inPlay = state==='aim'||state==='drag'||state==='shot'||state==='between';
    $('homeBtn').classList.toggle('show', inPlay);
  }

  // ---------- drawing ----------
  function drawField(){
    const stripes=10, sh=H/stripes;
    for(let i=0;i<stripes;i++){ ctx.fillStyle=i%2?'#2c7a3e':'#338a47'; ctx.fillRect(0,i*sh,W,sh+1); }
    const vg=ctx.createRadialGradient(W/2,H*0.5,140,W/2,H*0.5,H*0.72);
    vg.addColorStop(0,'rgba(255,255,230,0.10)'); vg.addColorStop(0.6,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,10,4,0.45)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    ctx.strokeStyle='rgba(243,246,239,.85)'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.strokeRect(F.l,F.t,F.r-F.l,F.b-F.t);
    ctx.beginPath(); ctx.moveTo(F.l,MID_Y); ctx.lineTo(F.r,MID_Y); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2,MID_Y,62,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(243,246,239,.85)'; ctx.beginPath(); ctx.arc(W/2,MID_Y,4,0,Math.PI*2); ctx.fill();

    // top end markings
    ctx.strokeRect(W/2-BOX_HALF,F.t,BOX_HALF*2,BOX_D);
    ctx.strokeRect(W/2-SBOX_HALF,F.t,SBOX_HALF*2,SBOX_D);
    ctx.beginPath(); ctx.arc(W/2,F.t+SPOT_D,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(W/2,F.t+SPOT_D,ARC_R,Math.PI/2-ARC_TH,Math.PI/2+ARC_TH); ctx.stroke();
    // bottom end markings
    ctx.strokeRect(W/2-BOX_HALF,F.b-BOX_D,BOX_HALF*2,BOX_D);
    ctx.strokeRect(W/2-SBOX_HALF,F.b-SBOX_D,SBOX_HALF*2,SBOX_D);
    ctx.beginPath(); ctx.arc(W/2,F.b-SPOT_D,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(W/2,F.b-SPOT_D,ARC_R,-Math.PI/2-ARC_TH,-Math.PI/2+ARC_TH); ctx.stroke();

    ctx.beginPath(); ctx.arc(F.l,F.t,14,0,Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(F.r,F.t,14,Math.PI/2,Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(F.l,F.b,14,-Math.PI/2,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(F.r,F.b,14,Math.PI,Math.PI*1.5); ctx.stroke();
  }
  function drawGoal(side){
    const x0=W/2-G.halfW, x1=W/2+G.halfW, yLine=goals[side].y, dir=goals[side].dir, yBack=yLine+dir*G.depth;
    const sway=Math.sin(performance.now()/130)*4*ripple[side];
    const isTarget=(state==='aim'||state==='drag')&&TARGET[player]===side;
    ctx.fillStyle='rgba(10,20,12,.55)'; ctx.fillRect(x0,Math.min(yLine,yBack),x1-x0,G.depth);
    ctx.strokeStyle='rgba(243,246,239,.5)'; ctx.lineWidth=1;
    for(let x=x0;x<=x1;x+=13){ ctx.beginPath(); ctx.moveTo(x,yLine); ctx.lineTo(x+sway,yBack); ctx.stroke(); }
    for(let i=0;i<=G.depth;i+=11){ const y=yLine+dir*i,k=i/G.depth; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y+sway*k*0.4); ctx.stroke(); }
    if(isTarget){ const pulse=0.5+0.5*Math.sin(performance.now()/300);
      ctx.strokeStyle=COLORS[player]; ctx.lineWidth=9; ctx.globalAlpha=0.25+pulse*0.3;
      ctx.beginPath(); ctx.moveTo(x0,yLine); ctx.lineTo(x0,yBack); ctx.lineTo(x1,yBack); ctx.lineTo(x1,yLine); ctx.stroke(); ctx.globalAlpha=1; }
    ctx.strokeStyle='#f7f9f4'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(x0,yLine); ctx.lineTo(x0,yBack); ctx.lineTo(x1,yBack); ctx.lineTo(x1,yLine); ctx.stroke();
    ctx.fillStyle='#ffffff'; [x0,x1].forEach(px=>{ ctx.beginPath(); ctx.arc(px,yLine,G.postR,0,Math.PI*2); ctx.fill(); });
    ripple[side]*=0.94;
  }
  function drawObstacles(){
    for(const o of obstacles){
      const col = o.kind==='keeper' ? '#ffd34d' : '#e6ecf2';
      const edge= o.kind==='keeper' ? '#b07d00' : '#7c8a99';
      // shadow
      ctx.fillStyle='rgba(0,0,0,.28)';
      roundRect(o.x-o.halfW+2, o.y-o.halfH+3, o.halfW*2, o.halfH*2, o.halfH); ctx.fill();
      // body
      const g=ctx.createLinearGradient(0,o.y-o.halfH,0,o.y+o.halfH);
      g.addColorStop(0,col); g.addColorStop(1,edge);
      ctx.fillStyle=g;
      roundRect(o.x-o.halfW, o.y-o.halfH, o.halfW*2, o.halfH*2, o.halfH); ctx.fill();
      // center stud
      ctx.fillStyle='rgba(0,0,0,.25)';
      ctx.beginPath(); ctx.arc(o.x,o.y,o.halfH*0.55,0,Math.PI*2); ctx.fill();
    }
  }
  function roundRect(x,y,w,h,r){ r=Math.min(r,h/2,w/2);
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function drawAim(){
    if(state!=='drag'||!drag) return;
    const dx=ball.x-drag.x, dy=ball.y-drag.y; let dist=Math.hypot(dx,dy);
    const pow=Math.min(dist,MAX_DRAG)/MAX_DRAG; if(dist<1) return;
    const ux=dx/dist, uy=dy/dist, col=COLORS[player];
    ctx.strokeStyle='rgba(243,246,239,.35)'; ctx.lineWidth=2; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(ball.x,ball.y); ctx.lineTo(drag.x,drag.y); ctx.stroke(); ctx.setLineDash([]);
    const len=90+pow*240;
    ctx.lineWidth=4; ctx.setLineDash([10,12]); ctx.lineDashOffset=-performance.now()/40;
    const g=ctx.createLinearGradient(ball.x,ball.y,ball.x+ux*len,ball.y+uy*len);
    g.addColorStop(0,col); g.addColorStop(1,'rgba(255,255,255,0)'); ctx.strokeStyle=g;
    ctx.beginPath(); ctx.moveTo(ball.x+ux*(R+6),ball.y+uy*(R+6)); ctx.lineTo(ball.x+ux*len,ball.y+uy*len); ctx.stroke(); ctx.setLineDash([]);
    const axx=ball.x+ux*len, ayy=ball.y+uy*len, a=Math.atan2(uy,ux);
    ctx.fillStyle=col; ctx.globalAlpha=0.4+pow*0.6;
    ctx.beginPath(); ctx.moveTo(axx+Math.cos(a)*14,ayy+Math.sin(a)*14);
    ctx.lineTo(axx+Math.cos(a+2.5)*11,ayy+Math.sin(a+2.5)*11);
    ctx.lineTo(axx+Math.cos(a-2.5)*11,ayy+Math.sin(a-2.5)*11); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
    ctx.lineWidth=5; ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.arc(ball.x,ball.y,R+9,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=col; ctx.beginPath(); ctx.arc(ball.x,ball.y,R+9,-Math.PI/2,-Math.PI/2+pow*Math.PI*2); ctx.stroke();
  }
  function drawBall(){
    for(let i=0;i<trail.length;i++){ const t=trail[i],a=i/trail.length;
      ctx.fillStyle=`rgba(243,246,239,${a*0.18})`; ctx.beginPath(); ctx.arc(t.x,t.y,R*(0.4+a*0.5),0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(ball.x+3,ball.y+5,R*1.05,R*0.8,0,0,Math.PI*2); ctx.fill();
    const g=ctx.createRadialGradient(ball.x-5,ball.y-6,2,ball.x,ball.y,R+2);
    g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#c9cfc6'); ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,R,0,Math.PI*2); ctx.fill();
    const rot=(ball.x+ball.y)*0.06; ctx.fillStyle='#1d2620';
    for(let i=0;i<5;i++){ const a=rot+i*Math.PI*2/5;
      ctx.beginPath(); ctx.arc(ball.x+Math.cos(a)*R*0.55,ball.y+Math.sin(a)*R*0.55,R*0.26,0,Math.PI*2); ctx.fill(); }
    ctx.beginPath(); ctx.arc(ball.x,ball.y,R*0.22,0,Math.PI*2); ctx.fill();
    if(state==='aim' && !isCPU(player)){
      const pulse=1+Math.sin(performance.now()/350)*0.12;
      ctx.strokeStyle=COLORS[player]; ctx.lineWidth=2.5; ctx.globalAlpha=0.85;
      ctx.beginPath(); ctx.arc(ball.x,ball.y,(R+8)*pulse,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
    }
  }

  // ---------- loop ----------
  let last=performance.now();
  function frame(now){
    const dt=Math.min(2,(now-last)/16.67); last=now;
    syncHomeBtn();
    if(state!=='menu'){
      moveObstacles(dt);
      // CPU turn
      if(state==='aim' && isCPU(player)){ cpuTimer-=dt; if(cpuTimer<=0) cpuShoot(); }
      step();
    }
    ctx.clearRect(0,0,W,H);
    drawField(); drawGoal('top'); drawGoal('bottom');
    if(state!=='menu') drawObstacles();
    drawAim(); drawBall();
    requestAnimationFrame(frame);
  }
  syncBoard();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
